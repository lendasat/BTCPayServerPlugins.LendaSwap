name: Create Release

on:
  pull_request:
    types: [closed]
    branches: [master]

jobs:
  release:
    if: github.event.pull_request.merged == true && startsWith(github.event.pull_request.head.ref, 'release/')
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - name: Extract version
        id: version
        run: |
          BRANCH="${{ github.event.pull_request.head.ref }}"
          VERSION="${BRANCH#release/}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Release version: $VERSION"

      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.414

      - name: Import GPG key
        if: ${{ secrets.GPG_PRIVATE_KEY != '' }}
        run: |
          echo "${{ secrets.GPG_PRIVATE_KEY }}" | base64 -d | gpg --batch --import
          echo "GPG key imported"
          gpg --list-keys --keyid-format long

      - name: Build solution (Release)
        run: dotnet build BTCPayServerPlugins.RockstarDev.sln -c Release -maxcpucount:1

      - name: Package plugin
        run: |
          dotnet run --project submodules/btcpayserver/BTCPayServer.PluginPacker \
            Plugins/BTCPayServer.LendaSwap.Plugins.Swap/bin/Release/net8.0 \
            BTCPayServer.LendaSwap.Plugins.Swap \
            ./artifacts

      - name: Sign artifacts with GPG
        if: ${{ secrets.GPG_PRIVATE_KEY != '' }}
        run: |
          cd artifacts
          BTCPAY_FILE=$(find . -name "*.btcpay" | head -1)
          if [ -n "$BTCPAY_FILE" ]; then
            sha256sum "$BTCPAY_FILE" > SHA256SUMS
            gpg --batch --yes --armor --detach-sign SHA256SUMS
            echo "Signed SHA256SUMS:"
            cat SHA256SUMS
          fi

      - name: List artifacts
        run: find ./artifacts -type f

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: LendaSwap Plugin v${{ steps.version.outputs.version }}
          generate_release_notes: true
          files: |
            artifacts/**/*.btcpay
            artifacts/**/*.btcpay.json
            artifacts/**/SHA256SUMS
            artifacts/**/SHA256SUMS.asc
          body: |
            ## LendaSwap Plugin v${{ steps.version.outputs.version }}

            ### Installation
            1. Go to your BTCPayServer → Server Settings → Plugins
            2. Upload the `.btcpay` file from this release
            3. Restart BTCPayServer

            ### Verify Signature
            ```bash
            # Import the LendaSwap public key
            gpg --keyserver keyserver.ubuntu.com --recv-keys DE09AE0D86F564C4
            # Verify
            gpg --verify SHA256SUMS.asc SHA256SUMS
            sha256sum -c SHA256SUMS
            ```

            ### Plugin Builder
            - **Repository:** `${{ github.server_url }}/${{ github.repository }}`
            - **Branch:** `master`
            - **Directory:** `Plugins/BTCPayServer.LendaSwap.Plugins.Swap`

            **GPG Fingerprint:** `B772 B5EF 21EF 0373 6B6F C9CD DE09 AE0D 86F5 64C4`
